services:
  # ============================================
  # NGINX - Servidor Web
  # Dokploy/Traefik maneja SSL externamente
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
    ports:
      - "3080:80"
    volumes:
      - app_storage:/var/www/html/storage
      - nginx_logs:/var/log/nginx
    depends_on:
      php:
        condition: service_healthy
    networks:
      - apidian_network
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # PHP-FPM 8.1 - Aplicación Laravel 10
  # ============================================
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage
      - php_logs:/var/log/php
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - TZ=America/Bogota
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY:-}
      - APP_URL=${APP_URL:-http://localhost}
      - FORCE_HTTPS=${FORCE_HTTPS:-true}
      - DB_CONNECTION=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-apidian}
      - DB_USERNAME=${DB_USERNAME:-apidian}
      - DB_PASSWORD=${DB_PASSWORD:-apidian}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-APIDIAN}
      - ALLOW_PUBLIC_DOWNLOAD=${ALLOW_PUBLIC_DOWNLOAD:-true}
      - APPLY_SEND_CUSTOMER_CREDENTIALS=${APPLY_SEND_CUSTOMER_CREDENTIALS:-true}
      - GRAPHIC_REPRESENTATION_TEMPLATE=${GRAPHIC_REPRESENTATION_TEMPLATE:-2}
      - VALIDATE_BEFORE_SENDING=${VALIDATE_BEFORE_SENDING:-true}
      - ENABLE_API_REGISTER=${ENABLE_API_REGISTER:-true}
      - ALLOW_PUBLIC_REGISTER=${ALLOW_PUBLIC_REGISTER:-true}
      - SAVE_RESPONSE_DIAN_TO_DB=${SAVE_RESPONSE_DIAN_TO_DB:-false}
    networks:
      - apidian_network
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # MariaDB 10.11 - Base de Datos
  # ============================================
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      TZ: America/Bogota
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-apidian}
      MYSQL_USER: ${DB_USERNAME:-apidian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apidian}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=200
      --skip-name-resolve
    networks:
      - apidian_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Redis 7 - Cache, Sesiones y Colas
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - apidian_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  apidian_network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  nginx_logs:
    driver: local
  php_logs:
    driver: local
